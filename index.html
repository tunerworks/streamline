<!DOCTYPE html>
<html lang="en">
<head>

<title>Streamline</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap');
  :root{
    --bg:#0b0d13; --panel:#12151E; --panel2:#171B26; --ink:#0C0E14;
    --line:#262C3B; --line2:#232838; --text:#E9ECF2; --muted:#8A93A3;
    --dim:#565E70; --amber:#A6C79C; --amber2:#7FA576; --teal:#6FA3C9;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; }
  body {
    min-height: 100vh;
    background: radial-gradient(circle at 50% -10%, #1b2130 0%, #10131b 55%, var(--bg) 100%);
    color: var(--text);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    padding: env(safe-area-inset-top) 0 0 0;
    -webkit-user-select: none; user-select: none;
  }
  input, textarea { -webkit-user-select: text; user-select: text; }
  .app { max-width: 480px; margin: 0 auto; padding: 18px 16px 64px; }
  button { font-family: inherit; }

  /* header */
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .brand { display: flex; align-items: center; gap: 11px; }
  .brand-mark { width: 36px; height: 36px; border-radius: 9px; background: linear-gradient(135deg, var(--amber), var(--amber2)); display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 18px rgba(166,199,156,0.3); }
  .brand-mark svg { display:block; }
  .brand-text { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 21px; letter-spacing: 0.5px; text-transform: uppercase; line-height:1; }
  .who-badge { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--dim); letter-spacing: 1px; text-transform: uppercase; margin-top:3px; }
  .who-switch { background: none; border: none; color: var(--amber); font-family: inherit; font-size: 10px; text-decoration: underline; cursor: pointer; padding: 0; }
  .header-btns { display: flex; gap: 9px; }
  .round-btn { width: 44px; height: 44px; border-radius: 13px; border: 1px solid var(--line); background: var(--panel2); color: var(--text); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform .12s, background .12s; position: relative; }
  .btn-dot { position:absolute; top:7px; right:7px; width:9px; height:9px; border-radius:50%; background:var(--amber); border:2px solid var(--panel2); }
  .round-btn:active { transform: scale(.92); background: #1f2532; }
  .round-btn.accent { color: var(--amber); }
  .round-btn svg { display:block; }

  /* search */
  .search-wrap { position: relative; margin-bottom: 20px; }
  .search { width:100%; background: var(--ink); border:1px solid var(--line); border-radius: 12px; color: var(--text); font-size: 14px; padding: 11px 14px 11px 38px; }
  .search:focus { outline: 1px solid var(--amber); }
  .search-ico { position:absolute; left:13px; top:50%; transform:translateY(-50%); color: var(--dim); display:flex; }

  .section { margin-bottom: 26px; }
  .section-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--line2); }
  .section-title { font-family: 'Oswald', sans-serif; font-size: 15px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #C7CDDA; }
  .section-count { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--dim); }
  .empty { font-size: 13px; color: var(--dim); padding: 20px 16px; border: 1px dashed var(--line); border-radius: 12px; text-align: center; line-height:1.5; }

  .card { background: linear-gradient(160deg, var(--panel2), var(--panel)); border: 1px solid var(--line); border-radius: 16px; padding: 16px; margin-bottom: 12px; animation: rise .25s ease; }
  @keyframes rise { from { opacity:0; transform: translateY(6px);} to {opacity:1; transform:none;} }
  .card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .platform-tag { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.4px; flex: 1; }
  .added-by { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--amber); background: rgba(166,199,156,0.1); border: 1px solid rgba(166,199,156,0.25); border-radius: 6px; padding: 2px 7px; }
  .sig-bars { display: flex; align-items: flex-end; gap: 2px; height: 16px; }
  .sig-bar { width: 3px; background: var(--amber); border-radius: 1px; }
  .card-title { font-family: 'Oswald', sans-serif; font-size: 20px; font-weight: 600; margin: 8px 0 12px; color: #F3F5F9; cursor: pointer; display:flex; align-items:center; gap:7px; }
  .edit-ico { color: var(--dim); display:flex; }

  .readout { background: var(--ink); border: 1px solid #1E2330; border-radius: 11px; padding: 12px 14px; margin-bottom: 14px; }
  .readout-numbers { font-family: 'IBM Plex Mono', monospace; display: flex; align-items: baseline; gap: 2px; margin-bottom: 9px; }
  .readout-label { font-size: 12px; color: #6B7386; margin-right: 2px; }
  .readout-val { font-size: 22px; font-weight: 600; color: var(--amber); text-shadow: 0 0 12px rgba(166,199,156,0.4); margin-right: 8px; }
  .readout-total { font-size: 13px; color: var(--dim); }
  .dial { display: flex; align-items: center; gap: 3px; }
  .tick { flex: 1; height: 6px; border-radius: 2px; background: #1E2330; }
  .tick-on { background: var(--teal); box-shadow: 0 0 6px rgba(111,163,201,0.5); }
  .dial-pct { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--teal); margin-left: 8px; min-width: 32px; text-align: right; }

  .stepper-row { display: flex; gap: 10px; margin-bottom: 12px; }
  .stepper { flex: 1; background: var(--panel); border: 1px solid var(--line2); border-radius: 11px; padding: 8px 10px; }
  .stepper-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; }
  .stepper-controls { display: flex; align-items: center; justify-content: space-between; margin-top: 5px; }
  .step-btn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--line); background: var(--panel2); color: #C7CDDA; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; line-height:0; transition: background .1s; }
  .step-btn:active { background: #232838; }
  .stepper-val { font-family: 'IBM Plex Mono', monospace; font-size: 17px; font-weight: 600; color: #F3F5F9; }

  .card-foot { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .link-btn { background: none; border: none; color: var(--dim); font-size: 12px; text-decoration: underline; cursor: pointer; padding: 0; }
  .total-input { background: var(--ink); border: 1px solid var(--line); border-radius: 7px; color: var(--text); font-size: 12px; padding: 6px 8px; width: 150px; }
  .card-actions { display: flex; align-items: center; gap: 8px; }
  .finish-btn { display: flex; align-items: center; gap: 6px; background: rgba(111,163,201,0.1); border: 1px solid rgba(111,163,201,0.4); color: var(--teal); border-radius: 9px; padding: 9px 13px; font-size: 12px; font-weight: 600; cursor: pointer; }
  .finish-btn:active { background: rgba(111,163,201,0.2); }
  .icon-btn { background: none; border: none; color: #4A5162; cursor: pointer; padding: 5px; display:flex; }
  .icon-btn:active { color: var(--muted); }

  .q-row { display: flex; align-items: center; gap: 11px; padding: 13px 4px; border-bottom: 1px solid #1C202C; }
  .q-info { flex: 1; display: flex; flex-direction: column; min-width:0; }
  .q-title { font-size: 14px; font-weight: 500; color: var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .q-platform { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--dim); margin-top: 2px; }
  .q-start { background: var(--panel2); border: 1px solid var(--amber); color: var(--amber); border-radius: 9px; padding: 8px 14px; font-size: 12px; font-weight: 600; cursor: pointer; }
  .q-start:active { background: rgba(166,199,156,0.12); }

  .done-toggle { background: none; border: none; color: var(--dim); font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; padding: 4px 0; }
  .done-row { display: flex; align-items: center; gap: 10px; padding: 10px 4px; font-size: 13px; color: #6B7386; }
  .done-row .dot { opacity: 0.5; }
  .done-row .r-title { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  .foot-note { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #3E4556; text-align: center; margin-top: 28px; letter-spacing: 0.5px; line-height: 1.7; }

  /* tag filtering */
  .filter-row { display:flex; gap:8px; overflow-x:auto; padding-bottom: 6px; margin-bottom: 18px; -ms-overflow-style:none; scrollbar-width:none; }
  .filter-row::-webkit-scrollbar { display:none; }
  .filter-chip { flex:0 0 auto; display:flex; align-items:center; gap:6px; font-family:'IBM Plex Mono',monospace; font-size:11px; padding:7px 12px; border-radius:20px; border:1px solid var(--line); background:var(--panel2); color:var(--muted); cursor:pointer; white-space:nowrap; transition:transform .1s; }
  .filter-chip:active { transform: scale(.94); }
  .filter-chip.on { border-color:var(--amber); color:var(--amber); background:rgba(166,199,156,0.1); }
  .filter-chip .filter-count { font-size:9px; color:var(--dim); background:var(--ink); border-radius:8px; padding:1px 6px; }
  .filter-chip.on .filter-count { color:var(--amber); background:rgba(166,199,156,0.12); }
  .filter-chip.clear { border-style:dashed; color:var(--dim); }

  .tag-pill-row { display:flex; flex-wrap:wrap; gap:6px; margin: 0 0 12px; }
  .tag-pill { font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:.3px; padding:4px 9px; border-radius:14px; border:1px solid var(--line); background:var(--ink); color:#9AA3B4; cursor:pointer; }
  .tag-pill.static:active { border-color:var(--amber); color:var(--amber); }
  .tag-pill.removable { display:inline-flex; align-items:center; gap:5px; background:rgba(166,199,156,0.1); border-color:rgba(166,199,156,0.3); color:var(--amber); }
  .tag-pill.ghost { background:var(--panel2); color:var(--muted); }
  .tag-x { display:inline-flex; }
  .tag-edit-row { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; }
  .tag-suggest { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }

  /* list switcher */
  .list-bar { display:flex; gap:8px; overflow-x:auto; padding-bottom:6px; margin-bottom:20px; -ms-overflow-style:none; scrollbar-width:none; }
  .list-bar::-webkit-scrollbar { display:none; }
  .list-tab { flex:0 0 auto; display:flex; align-items:center; gap:7px; font-family:'Oswald',sans-serif; font-size:13px; font-weight:600; letter-spacing:.3px; text-transform:uppercase; padding:9px 14px; border-radius:11px; border:1px solid var(--line); background:var(--panel2); color:var(--muted); cursor:pointer; white-space:nowrap; transition:transform .1s; }
  .list-tab:active { transform: scale(.95); }
  .list-tab.on { border-color:var(--amber); color:var(--amber); background:rgba(166,199,156,0.1); }
  .list-tab-count { font-family:'IBM Plex Mono',monospace; font-size:10px; font-weight:500; color:var(--dim); background:var(--ink); border-radius:8px; padding:1px 6px; }
  .list-tab.on .list-tab-count { color:var(--amber); background:rgba(166,199,156,0.14); }
  .list-tab.manage { color:var(--dim); padding:9px 12px; }
  .list-tab.manage .i, .list-tab.manage svg { display:block; }

  .list-pick { flex:1; display:flex; flex-direction:column; align-items:flex-start; gap:2px; background:var(--panel2); border:1px solid var(--line); border-radius:11px; padding:11px 14px; cursor:pointer; text-align:left; }
  .list-pick.on { border-color:var(--amber); }
  .list-pick-name { font-family:'Oswald',sans-serif; font-size:15px; font-weight:600; color:var(--text); }
  .list-pick.on .list-pick-name { color:var(--amber); }
  .list-pick-count { font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--dim); }

  /* sheets */
  .overlay { position: fixed; inset: 0; background: rgba(6,7,11,0.74); display: flex; align-items: flex-end; justify-content: center; z-index: 30; animation: fade .2s ease; }
  @keyframes fade { from {opacity:0;} to {opacity:1;} }
  .sheet { width: 100%; max-width: 480px; background: var(--panel); border: 1px solid var(--line); border-bottom:none; border-radius: 22px 22px 0 0; padding: 10px 18px calc(26px + env(safe-area-inset-bottom)); max-height: 90vh; overflow-y: auto; animation: slideup .28s cubic-bezier(.2,.8,.2,1); }
  @keyframes slideup { from { transform: translateY(100%);} to { transform:none;} }
  .grabber { width: 38px; height: 4px; border-radius: 2px; background: #2E3545; margin: 0 auto 14px; }
  .sheet-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .eyebrow { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--amber); }
  .field-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--dim); margin-bottom: 7px; }
  .title-input, .paste-box, .name-input { width: 100%; background: var(--ink); border: 1px solid var(--line); border-radius: 11px; color: #F3F5F9; font-size: 16px; padding: 13px 14px; margin-bottom: 16px; font-family: 'Inter', sans-serif; }
  .paste-box { min-height: 88px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; resize: vertical; }
  .title-input:focus, .paste-box:focus, .total-input:focus, .name-input:focus { outline: 1px solid var(--amber); }
  .chip-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
  .chip { font-family: 'IBM Plex Mono', monospace; font-size: 11px; padding: 8px 12px; border-radius: 20px; border: 1px solid var(--line); background: var(--panel2); color: var(--muted); cursor: pointer; transition: transform .1s; }
  .chip:active { transform: scale(.94); }
  .chip-on { background: #1B2130; }
  .status-row { display: flex; gap: 10px; margin-bottom: 20px; }
  .status-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 12px; border-radius: 11px; border: 1px solid var(--line); background: var(--panel2); color: var(--muted); font-size: 13px; cursor: pointer; }
  .status-on { border-color: var(--amber); color: var(--amber); background: rgba(166,199,156,0.08); }
  .primary-btn { width: 100%; background: linear-gradient(135deg, var(--amber), var(--amber2)); border: none; border-radius: 12px; color: #14161C; font-weight: 700; font-size: 15px; padding: 15px; cursor: pointer; transition: filter .12s, transform .1s; }
  .primary-btn:active { filter: brightness(1.08); transform: scale(.99); }
  .ghost-btn { width: 100%; background: var(--panel2); border: 1px solid var(--line); border-radius: 12px; color: #C7CDDA; font-weight: 600; font-size: 14px; padding: 13px; cursor: pointer; margin-top: 10px; }
  .ghost-btn:active { background: #1f2532; }
  .danger-btn { color:#E5817F; border-color: rgba(229,72,77,0.3); }
  .sheet-p { font-size: 13px; color: var(--muted); line-height: 1.55; margin: 0 0 16px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 18px; background: var(--ink); padding: 4px; border-radius: 12px; }
  .tab { flex: 1; padding: 10px; border-radius: 9px; border: none; background: transparent; color: var(--muted); font-size: 13px; font-weight: 600; cursor: pointer; transition: background .15s, color .15s; }
  .tab-on { background: var(--panel2); color: var(--amber); box-shadow: 0 1px 3px rgba(0,0,0,.3); }

  .qr-wrap { display:flex; flex-direction:column; align-items:center; padding: 18px; background:#fff; border-radius: 16px; margin: 0 auto 16px; width: fit-content; }
  .qr-wrap svg { width: 190px; height: 190px; display:block; }
  .qr-cap { font-family:'IBM Plex Mono',monospace; font-size:10px; color:#6B7386; text-align:center; margin-bottom: 16px; letter-spacing:.5px; }

  .toast { position: fixed; bottom: calc(26px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); background: #1B2130; border: 1px solid var(--teal); color: var(--teal); padding: 11px 20px; border-radius: 12px; font-size: 13px; z-index: 50; font-family: 'IBM Plex Mono', monospace; box-shadow: 0 8px 30px rgba(0,0,0,.4); animation: rise .2s ease; max-width: 90%; text-align:center; }
  .toast.warn { border-color: var(--amber); color: var(--amber); }

  /* member management */
  .member-row { display:flex; align-items:center; gap:10px; padding: 10px 0; border-bottom: 1px solid var(--line2); }
  .member-dot { width: 30px; height:30px; border-radius:50%; background: linear-gradient(135deg,var(--amber),var(--amber2)); display:flex; align-items:center; justify-content:center; font-family:'Oswald',sans-serif; font-weight:700; color:#14161C; font-size:14px; }
  .member-name { flex:1; font-size:15px; }
  .add-member { display:flex; gap:8px; margin-top: 14px; }
  .add-member .name-input { margin-bottom:0; }

  /* onboarding / gate */
  .gate { display: flex; flex-direction: column; align-items: center; text-align: center; padding-top: 44px; }
  .gate-mark { width: 60px; height: 60px; border-radius: 16px; margin-bottom: 20px; background: linear-gradient(135deg,var(--amber),var(--amber2)); display:flex; align-items:center; justify-content:center; box-shadow: 0 8px 30px rgba(166,199,156,.35); }
  .gate-title { font-family: 'Oswald', sans-serif; font-size: 32px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
  .gate-sub { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--amber); letter-spacing: 2px; text-transform: uppercase; margin-top: 5px; }
  .gate-hint { font-size: 14px; color: var(--muted); line-height: 1.55; max-width: 310px; margin: 20px 0 26px; }
  .gate-names { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 340px; }
  .gate-name { background: linear-gradient(160deg, var(--panel2), var(--panel)); border: 1px solid var(--line); border-radius: 14px; color: #F3F5F9; font-family: 'Oswald', sans-serif; font-size: 18px; font-weight: 600; padding: 20px 12px; cursor: pointer; transition: transform .1s, border-color .1s; }
  .gate-name:active { border-color: var(--amber); transform: scale(.97); }
  .gate-card { width:100%; max-width:340px; background: var(--panel); border:1px solid var(--line); border-radius: 16px; padding: 18px; margin-top: 10px; }
</style>
</head>

    if(qr){ kids.push(el("div",{style:"height:16px"})); kids.push(el("div",{class:"qr-wrap"},[ el("div",{html:qr}) ])); kids.push(el("div",{class:"qr-cap"},["Or scan on another phone that's on this app"])); }
    else if(!isHosted()){ kids.push(el("p",{class:"sheet-p",style:"margin-top:14px;color:#565E70"},["QR + tap-to-sync links work once the app is hosted at a web address. Running from a file, use Copy link and paste it on the Receive tab."])); }

  } else if(state.syncTab==="receive"){

  } else {

function backupReminderSheet(){
  var overlay=el("div",{class:"overlay",onClick:function(e){ if(e.target===overlay){ state.sheet=null; render(); } }});
  var days = state.backupAt ? Math.floor(daysSinceBackup()) : null;
  var whenText = state.backupAt ? ("Last backup was "+(days<=0?"today":days+(days===1?" day":" days")+" ago")+".") : "You haven't backed up yet.";
  var sheet=el("div",{class:"sheet"},[ el("div",{class:"grabber"}),
    el("div",{class:"sheet-head"},[ el("span",{class:"eyebrow"},["Back up?"]), el("button",{class:"icon-btn",onClick:function(){ state.sheet=null; render(); },html:ICO.x}) ]),
    el("p",{class:"sheet-p"},["You've made "+state.pending+(state.pending===1?" change":" changes")+" since your last backup. "+whenText+" Your lists live on this phone, so a quick backup keeps them safe."]),
    el("button",{class:"primary-btn",onClick:function(){ state.sheet=null; exportBackup(); }},["Back up now"]),
    el("p",{class:"sheet-p",style:"margin:14px 0 0;color:#565E70;font-size:12px"},["Tip: when the share sheet opens, choose Save to Files \u2192 iCloud Drive so it syncs automatically."]),
    el("button",{class:"ghost-btn",onClick:function(){ state.sheet=null; render(); }},["Maybe later"]) ]);

}

function exportBackup(){
  saveShows();
  var data = { app:"streamline", v:2, exportedBy: state.who, exportedAt: now(), members: state.members, lists: state.lists };
  var json = JSON.stringify(data, null, 2);
  var d = new Date();
  var name = "streamline-backup-" + d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0") + ".json";
  try{
    var blob = new Blob([json], { type:"application/json" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = name;
    document.body.appendChild(a); a.click();
    setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); }, 500);
    markBackedUp();
    toast("Backup saved");
  }catch(e){
    if(navigator.share){ navigator.share({ title:name, text:json }).catch(function(){}); }
    else copy(json);
  }
}
function normShows(arr){ return (arr||[]).map(function(s){ return (s && s.length) ? unpackShow(s) : s; }); }
function applyBackup(data, replace){
  if(!data || (data.app!=="streamline" && data.app!=="signal-log" && !data.shows && !data.lists)) throw new Error("not a backup");
  if(data.members && data.members.length){
    if(replace) state.members = data.members.slice();
    else { data.members.forEach(function(m){ if(state.members.indexOf(m)<0) state.members.push(m); }); }
    saveMembers();
  }
  var incomingLists;
  if(data.lists && data.lists.length){
    incomingLists = data.lists.map(function(l){ return { id:l.id||uid(), name:l.name||"List", shows: normShows(l.shows) }; });
  } else {
    // legacy backup with a flat shows array -> one list
    incomingLists = [ { id: (state.lists[0]&&state.lists[0].id)||uid(), name:"My List", shows: normShows(data.shows) } ];
  }
  if(replace){
    state.lists = incomingLists;
  } else {
    incomingLists.forEach(function(inc){
      var match=null;
      for(var i=0;i<state.lists.length;i++){ if(state.lists[i].id===inc.id){ match=state.lists[i]; break; } }
      if(match){ match.shows = mergeShows(match.shows, inc.shows); if(inc.name) match.name=match.name||inc.name; }
      else state.lists.push(inc);
    });
  }
  if(!cur() && state.lists[0]) state.currentListId = state.lists[0].id;
  state.shows = cur()?cur().shows:[];
  persistLists();
}
function importBackupFile(file, replace){
  var reader = new FileReader();
  reader.onload = function(){
    try{
      var data = JSON.parse(reader.result);
      applyBackup(data, replace);
      var totalShows = state.lists.reduce(function(n,l){ return n+l.shows.length; }, 0);
      state.sheet=null; render();
      toast(replace ? "Restored \u00b7 "+state.lists.length+" lists" : "Merged \u00b7 "+totalShows+" shows");
    }catch(e){ toast("Couldn't read that backup file",1); }
  };
  reader.onerror = function(){ toast("Couldn't open the file",1); };
  reader.readAsText(file);
}

        state.lists.length>1 ? el("button",{class:"icon-btn",title:"Delete",onClick:function(){ if(confirm("Delete the list \u201c"+l.name+"\u201d and its shows? This can't be undone.")) deleteList(l.id); },html:ICO.trash}) : null ]));
    }
  });
  var input=el("input",{class:"name-input",style:"margin-bottom:0",placeholder:"New list name (e.g. Movie Night, Kids)",value:state.newList});

  var sheet=el("div",{class:"sheet"},[ el("div",{class:"grabber"}),
    el("div",{class:"sheet-head"},[ el("span",{class:"eyebrow"},["Lists"]), el("button",{class:"icon-btn",onClick:function(){ state.sheet=null; state.renamingId=null; render(); },html:ICO.x}) ]),
    el("p",{class:"sheet-p"},["Each list keeps its own shows and syncs on its own. Switch between them anytime \u2014 great for separate groups or categories like date night, kids, or movies."]),
    box,
    el("div",{class:"add-member"},[ input, el("button",{class:"ghost-btn",style:"width:auto;margin:0;padding:13px 18px",onClick:addNew},["Create"]) ]) ]);
  overlay.appendChild(sheet); return overlay;
}

  overlay.appendChild(sheet); return overlay;

/* ---------- boot: auto-import from URL hash ---------- */
function boot(){
  load();
  var h = location.hash || "";
  if(h.indexOf("SL3.")>=0 || h.indexOf("SL2.")>=0 || h.indexOf("SL1.")>=0){
    try{
      var d=decodeAny(h);
      if(!state.members){ // accept a shared list even before setup: seed a member from sender
        state.members = d.by ? [d.by] : ["Me"]; saveMembers();
      }
      var r = receiveInto(d);
      if(r.created) { state.currentListId = r.list.id; state.shows = r.list.shows; persistLists(); }
      history.replaceState(null,"",appBaseUrl());
      render();
      setTimeout(function(){ toast((r.created?"Added list \u201c"+r.list.name+"\u201d":"Synced"+(d.by?" from "+d.by:""))+" \u00b7 "+r.added+" new"); },300);
      return;
    }catch(e){ history.replaceState(null,"",appBaseUrl()); }
  }
  render();
  maybeRemind();
}
boot();
// remind when returning to the app after making changes (closest reliable stand-in for "on close")
document.addEventListener("visibilitychange", function(){ if(!document.hidden) maybeRemind(); });
